<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BST Visualizer — Interactive Learning</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ========== CSS VARIABLES & THEME ========== */
    :root {
      --bg-color: #0f172a;
      --panel-bg: #1e293b;
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --node-bg: #1e293b;
      --node-border: #3b82f6;
      --node-text: #f8fafc;
      --edge-color: #475569;
      --glow-active: rgba(59, 130, 246, 0.6);
      --font-main: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    
    [data-theme="light"] {
      --bg-color: #f1f5f9;
      --panel-bg: #ffffff;
      --text-color: #0f172a;
      --text-muted: #64748b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --node-bg: #ffffff;
      --node-text: #0f172a;
      --edge-color: #cbd5e1;
      --glow-active: rgba(37, 99, 235, 0.4);
    }

    /* ========== RESET & BASE ========== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes smoothLoad {
      0% { opacity: 0; filter: blur(10px); transform: scale(0.98); }
      100% { opacity: 1; filter: blur(0); transform: scale(1); }
    }
    body {
      font-family: var(--font-main);
      background-color: var(--bg-color);
      color: var(--text-color);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s, color 0.3s;
      animation: smoothLoad 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* ========== HEADER ========== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: var(--panel-bg);
      border-bottom: 1px solid var(--edge-color);
      z-index: 10;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .logo { display: flex; align-items: center; gap: 0.5rem; }
    .logo h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-right { display: flex; align-items: center; gap: 1.5rem; }
    .theme-toggle { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-color); transition: transform 0.2s; }
    .theme-toggle:hover { transform: scale(1.1); }
    
    /* ========== LAYOUT ========== */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .panel {
      width: 320px;
      background-color: var(--panel-bg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--edge-color);
      transition: all 0.3s;
      z-index: 5;
    }
    .explanation-panel { border-right: none; border-left: 1px solid var(--edge-color); width: 350px; }
    .panel-header { padding: 1rem; border-bottom: 1px solid var(--edge-color); font-weight: 600; }
    .panel-content { padding: 1.5rem; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 1.5rem; }
    
    /* ========== VISUALIZATION AREA ========== */
    .visualization-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.2) 100%);
    }
    .tree-container {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: auto;
    }
    .edges-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .nodes-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
    }
    
    /* ========== NODES & EDGES ========== */
    .node {
      position: absolute;
      width: 50px;
      height: 50px;
      background-color: var(--node-bg);
      border: 3px solid var(--node-border);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 1.2rem;
      color: var(--node-text);
      transform: translate(-50%, -50%);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    
    /* Node states */
    .node.active { border-color: var(--warning); box-shadow: 0 0 20px var(--warning); transform: translate(-50%, -50%) scale(1.1); z-index: 10; }
    .node.found { border-color: var(--success); box-shadow: 0 0 20px var(--success); transform: translate(-50%, -50%) scale(1.2); z-index: 10; }
    .node.deleting { border-color: var(--danger); opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    .node.inserting { animation: dropIn 0.5s ease-out forwards; }
    
    @keyframes dropIn {
      0% { opacity: 0; transform: translate(-50%, -150px) scale(0.5); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    .edge {
      stroke: var(--edge-color);
      stroke-width: 3;
      transition: all 0.5s ease;
    }
    .edge.active { stroke: var(--warning); stroke-width: 5; }

    /* ========== UI CONTROLS ========== */
    .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .input-group label { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
    input[type="number"] {
      width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--edge-color);
      background: var(--bg-color); color: var(--text-color); font-family: var(--font-mono); font-size: 1rem;
      outline: none; transition: border-color 0.2s;
    }
    input[type="number"]:focus { border-color: var(--primary); }
    
    .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .button-group.full { grid-template-columns: 1fr; }
    .btn {
      padding: 0.75rem; border-radius: 8px; border: none; font-weight: 600; font-size: 0.9rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: all 0.2s; color: #fff;
    }
    .btn:active { transform: translateY(2px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-insert { background-color: var(--success); }
    .btn-insert:hover:not(:disabled) { background-color: #059669; }
    .btn-delete { background-color: var(--danger); }
    .btn-delete:hover:not(:disabled) { background-color: #dc2626; }
    .btn-search { background-color: var(--primary); grid-column: span 2;}
    .btn-search:hover:not(:disabled) { background-color: var(--primary-hover); }
    .btn-traverse { background-color: #8b5cf6; }
    .btn-traverse:hover:not(:disabled) { background-color: #7c3aed; }
    .btn-reset { background-color: transparent; border: 1px solid var(--edge-color); color: var(--text-color); }
    .btn-reset:hover:not(:disabled) { background-color: rgba(255,255,255,0.1); }
    
    /* Speed Control */
    .speed-control { display: flex; align-items: center; gap: 1rem; margin-top: 0.5rem; }
    .speed-control input { flex: 1; cursor: pointer; }
    
    /* ========== TUTOR / EXPLANATION ========== */
    .tutor-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .avatar { font-size: 2.5rem; }
    .speech-bubble {
      background: rgba(59, 130, 246, 0.1); border: 1px solid var(--primary);
      border-radius: 12px; padding: 1rem; font-size: 0.95rem; line-height: 1.5;
      min-height: 80px; position: relative;
    }
    .speech-bubble::before {
      content: ''; position: absolute; top: 20px; left: -10px;
      border-width: 10px 10px 10px 0; border-style: solid;
      border-color: transparent var(--primary) transparent transparent;
    }
    
    .log-container {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem;
      padding-right: 0.5rem; font-family: var(--font-mono); font-size: 0.85rem;
    }
    .log-entry { padding: 0.5rem; border-radius: 6px; background: rgba(0,0,0,0.2); border-left: 3px solid var(--primary); animation: slideIn 0.3s ease; }
    .log-entry.success { border-color: var(--success); }
    .log-entry.warning { border-color: var(--warning); }
    .log-entry.danger { border-color: var(--danger); }
    
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    /* Floating bubble near nodes */
    .node-speech {
      position: absolute; background: var(--panel-bg); color: var(--text-color);
      padding: 0.4rem 0.8rem; border-radius: 20px; border: 1px solid var(--primary);
      font-size: 0.8rem; font-weight: 500; pointer-events: none; opacity: 0;
      transform: translate(-50%, -100px); transition: all 0.3s; z-index: 20;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); white-space: nowrap;
    }
    .node-speech.visible { opacity: 1; transform: translate(-50%, -60px); }

    /* Traversal Output */
    .traversal-output {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--panel-bg); padding: 1rem 2rem; border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid var(--primary);
      display: flex; gap: 0.5rem; align-items: center; z-index: 30; opacity: 0; transition: opacity 0.3s;
    }
    .traversal-output.visible { opacity: 1; }
    .traversal-item {
      display: inline-flex; justify-content: center; align-items: center;
      width: 35px; height: 35px; background: var(--primary); color: #fff;
      border-radius: 50%; font-family: var(--font-mono); font-weight: bold;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  </style>
</head>
<body data-theme="dark">

  <header>
    <div class="logo">
      <span style="font-size: 1.8rem;">🌳</span>
      <h1>BST Visualizer</h1>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeBtn" title="Toggle Theme">☀️</button>
    </div>
  </header>

  <div class="main-container">
    <!-- LEFT PANEL: CONTROLS -->
    <aside class="panel control-panel">
      <div class="panel-header">🎮 Controls</div>
      <div class="panel-content">
        <div class="input-group">
          <label>Node Value (0-999)</label>
          <input type="number" id="nodeValue" placeholder="e.g. 42" onkeypress="handleEnter(event)">
        </div>
        <div class="button-group">
          <button class="btn btn-insert" id="btnInsert" onclick="insertNode()">➕ Insert</button>
          <button class="btn btn-delete" id="btnDelete" onclick="deleteNode()">🗑️ Delete</button>
          <button class="btn btn-search" id="btnSearch" onclick="searchNode()">🔍 Search</button>
        </div>
        
        <div style="margin-top: 1rem; border-top: 1px solid var(--edge-color); padding-top: 1.5rem;">
          <label style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500; margin-bottom:0.5rem; display:block;">Traversals</label>
          <div class="button-group full">
            <button class="btn btn-traverse" onclick="traverse('inorder')">Inorder (L N R)</button>
            <button class="btn btn-traverse" onclick="traverse('preorder')">Preorder (N L R)</button>
            <button class="btn btn-traverse" onclick="traverse('postorder')">Postorder (L R N)</button>
          </div>
        </div>

        <div style="margin-top: 1rem; border-top: 1px solid var(--edge-color); padding-top: 1.5rem;">
          <label style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500;">Animation Speed</label>
          <div class="speed-control">
            <span>🐢</span>
            <input type="range" id="speedSlider" min="1" max="10" value="5">
            <span>🐇</span>
          </div>
        </div>

        <div style="margin-top: auto; padding-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem;">
           <button class="btn btn-reset full" style="width: 100%;" onclick="loadSampleTree()">🌲 Load Sample Tree</button>
           <button class="btn btn-reset full" style="width: 100%;" onclick="resetTree()">🔄 Reset Tree</button>
           <div style="text-align: center; margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-muted);">
             Made for learning by Harjas Singh
           </div>
        </div>
      </div>
    </aside>

    <!-- CENTER AREA: VISUALIZATION -->
    <main class="visualization-area" id="visArea">
      <div class="tree-container">
        <svg class="edges-layer" id="edgesLayer"></svg>
        <div class="nodes-layer" id="nodesLayer"></div>
      </div>
      <div class="node-speech" id="floatingSpeech">Hello!</div>
      
      <div class="traversal-output" id="traversalOutput">
        <strong style="color: var(--text-muted); margin-right: 10px;" id="traversalLabel">Result:</strong>
        <div id="traversalContainer" style="display: flex; gap: 5px;"></div>
      </div>
    </main>

    <!-- RIGHT PANEL: TUTOR -->
    <aside class="panel explanation-panel">
      <div class="panel-header">🎓 Tutor</div>
      <div class="panel-content" style="padding: 1rem;">
        <div class="tutor-header">
          <div class="avatar">🤖</div>
          <div class="speech-bubble" id="tutorText">
            Welcome to the BST Visualizer! Enter a number and click Insert to build your tree.
          </div>
        </div>
        
        <h4 style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted); border-bottom: 1px solid var(--edge-color); padding-bottom: 0.5rem;">Execution Log</h4>
        <div class="log-container" id="logContainer">
          <!-- Logs go here -->
        </div>
      </div>
    </aside>
  </div>

  <script>
    // ========== STATE & CONFIG ==========
    const Config = {
      nodeRadius: 25,
      levelHeight: 80,
      minSiblingDist: 60,
      animationSpeedMs: 800
    };

    let treeRoot = null;
    let isAnimating = false;
    
    // DOM Elements
    const nodesLayer = document.getElementById('nodesLayer');
    const edgesLayer = document.getElementById('edgesLayer');
    const nodeInput = document.getElementById('nodeValue');
    const tutorText = document.getElementById('tutorText');
    const logContainer = document.getElementById('logContainer');
    const floatingSpeech = document.getElementById('floatingSpeech');
    const speedSlider = document.getElementById('speedSlider');
    const themeBtn = document.getElementById('themeBtn');
    
    // Update speed based on slider (1: slow, 10: fast)
    speedSlider.addEventListener('input', (e) => {
      const val = parseInt(e.target.value);
      // Map 1-10 to 1500ms - 100ms
      Config.animationSpeedMs = 1500 - ((val - 1) * 155);
    });

    // Theme toggle
    themeBtn.addEventListener('click', () => {
      const body = document.body;
      if (body.getAttribute('data-theme') === 'dark') {
        body.setAttribute('data-theme', 'light');
        themeBtn.innerText = '🌙';
      } else {
        body.setAttribute('data-theme', 'dark');
        themeBtn.innerText = '☀️';
      }
    });

    // Handle Enter key in input
    function handleEnter(e) {
      if (e.key === 'Enter') insertNode();
    }

    // ========== UTILS ==========
    const sleep = (ms = Config.animationSpeedMs) => new Promise(r => setTimeout(r, ms));
    
    function setControlsState(disabled) {
      isAnimating = disabled;
      document.querySelectorAll('.btn').forEach(b => b.disabled = disabled);
      nodeInput.disabled = disabled;
    }

    function addLog(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = `log-entry ${type}`;
      div.innerText = msg;
      logContainer.prepend(div);
    }

    function updateTutor(msg) {
      tutorText.innerText = msg;
    }

    function showFloatingSpeech(node, msg) {
      if (!node) return;
      floatingSpeech.innerText = msg;
      floatingSpeech.style.left = node.x + 'px';
      floatingSpeech.style.top = node.y + 'px';
      floatingSpeech.classList.add('visible');
    }
    
    function hideFloatingSpeech() {
      floatingSpeech.classList.remove('visible');
    }

    function drawEdge(n1, n2, isActive = false) {
      const id = `edge-${n1.value}-${n2.value}`;
      let line = document.getElementById(id);
      if (!line) {
        line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.id = id;
        line.classList.add('edge');
        edgesLayer.appendChild(line);
      }
      line.setAttribute('x1', n1.x);
      line.setAttribute('y1', n1.y);
      line.setAttribute('x2', n2.x);
      line.setAttribute('y2', n2.y);
      if (isActive) line.classList.add('active');
      else line.classList.remove('active');
      return line;
    }

    function removeEdge(n1, n2) {
      if(!n1 || !n2) return;
      const id = `edge-${n1.value}-${n2.value}`;
      const line = document.getElementById(id);
      if (line) line.remove();
    }

    // ========== DATA STRUCTURES ==========
    class TreeNode {
      constructor(value) {
        this.value = value;
        this.left = null;
        this.right = null;
        this.x = 0;
        this.y = 0;
        this.element = null;
      }
    }

    // Create a DOM node
    function createNodeElement(value) {
      const div = document.createElement('div');
      div.className = 'node inserting';
      div.innerText = value;
      nodesLayer.appendChild(div);
      return div;
    }

    // ========== RENDERING ENGINE ==========
    // Calculate positions based on inorder traversal depth logic
    function calculatePositions() {
      if (!treeRoot) return;
      const canvasWidth = document.getElementById('visArea').clientWidth;
      const startY = 60;
      
      // Determine tree depth
      function getDepth(node) {
        if (!node) return 0;
        return 1 + Math.max(getDepth(node.left), getDepth(node.right));
      }
      const maxDepth = getDepth(treeRoot);
      
      function setPos(node, depth, leftBoundary, rightBoundary) {
        if (!node) return;
        const x = (leftBoundary + rightBoundary) / 2;
        const y = startY + (depth * Config.levelHeight);
        
        node.x = x;
        node.y = y;
        if (node.element) {
          node.element.style.left = `${x}px`;
          node.element.style.top = `${y}px`;
        }
        
        setPos(node.left, depth + 1, leftBoundary, x);
        setPos(node.right, depth + 1, x, rightBoundary);
      }
      
      setPos(treeRoot, 0, 0, canvasWidth);
      redrawEdges();
    }

    function redrawEdges() {
      edgesLayer.innerHTML = ''; // clear all
      function traverseDraw(node) {
        if (!node) return;
        if (node.left) {
          drawEdge(node, node.left);
          traverseDraw(node.left);
        }
        if (node.right) {
          drawEdge(node, node.right);
          traverseDraw(node.right);
        }
      }
      traverseDraw(treeRoot);
    }

    // Resize handler
    window.addEventListener('resize', () => {
      if (!isAnimating) calculatePositions();
    });

    // ========== CORE BST OPERATIONS ==========
    
    async function insertNode() {
      const val = parseInt(nodeInput.value);
      if (isNaN(val)) {
        updateTutor("Please enter a valid number!");
        return;
      }
      
      setControlsState(true);
      nodeInput.value = '';
      updateTutor(`Starting insertion of ${val}...`);
      addLog(`Inserting ${val}`, 'info');

      if (!treeRoot) {
        treeRoot = new TreeNode(val);
        treeRoot.element = createNodeElement(val);
        calculatePositions();
        updateTutor(`Tree was empty. Inserted ${val} as root.`);
        addLog(`${val} became root`, 'success');
        await sleep();
      } else {
        await insertRecursive(treeRoot, val);
      }

      // Cleanup
      document.querySelectorAll('.node').forEach(n => n.classList.remove('active', 'found', 'inserting'));
      redrawEdges();
      hideFloatingSpeech();
      setControlsState(false);
      updateTutor("Insertion complete. What's next?");
    }

    async function insertRecursive(node, val) {
      if (!node) return null;
      
      node.element.classList.add('active');
      
      if (val === node.value) {
        updateTutor(`${val} is already in the tree! No duplicates allowed.`);
        showFloatingSpeech(node, "I already exist!");
        await sleep();
        node.element.classList.remove('active');
        return node;
      }

      if (val < node.value) {
        updateTutor(`${val} < ${node.value}, so we go LEFT.`);
        showFloatingSpeech(node, `${val} < ${node.value} \nGo Left ⬅️`);
        await sleep();
        
        if (!node.left) {
          updateTutor(`Found empty spot! Inserting ${val} to the left of ${node.value}.`);
          const newNode = new TreeNode(val);
          newNode.element = createNodeElement(val);
          node.left = newNode;
          calculatePositions(); // update layout
          drawEdge(node, newNode, true);
          await sleep();
          node.element.classList.remove('active');
          addLog(`Inserted ${val} left of ${node.value}`, 'success');
          return newNode;
        } else {
          node.element.classList.remove('active');
          drawEdge(node, node.left, true);
          await sleep(Config.animationSpeedMs / 2);
          redrawEdges();
          return await insertRecursive(node.left, val);
        }
      } else {
        updateTutor(`${val} > ${node.value}, so we go RIGHT.`);
        showFloatingSpeech(node, `${val} > ${node.value} \nGo Right ➡️`);
        await sleep();
        
        if (!node.right) {
          updateTutor(`Found empty spot! Inserting ${val} to the right of ${node.value}.`);
          const newNode = new TreeNode(val);
          newNode.element = createNodeElement(val);
          node.right = newNode;
          calculatePositions();
          drawEdge(node, newNode, true);
          await sleep();
          node.element.classList.remove('active');
          addLog(`Inserted ${val} right of ${node.value}`, 'success');
          return newNode;
        } else {
          node.element.classList.remove('active');
          drawEdge(node, node.right, true);
          await sleep(Config.animationSpeedMs / 2);
          redrawEdges();
          return await insertRecursive(node.right, val);
        }
      }
    }

    async function searchNode() {
      const val = parseInt(nodeInput.value);
      if (isNaN(val)) return;
      
      setControlsState(true);
      updateTutor(`Searching for ${val}...`);
      addLog(`Searching for ${val}`);
      
      let curr = treeRoot;
      let found = false;
      
      while (curr) {
        curr.element.classList.add('active');
        if (val === curr.value) {
          updateTutor(`Found ${val}!`);
          showFloatingSpeech(curr, "Here I am! 🎉");
          curr.element.classList.remove('active');
          curr.element.classList.add('found');
          addLog(`Found ${val}`, 'success');
          found = true;
          await sleep(Config.animationSpeedMs * 1.5);
          break;
        } else if (val < curr.value) {
          updateTutor(`${val} < ${curr.value}, searching LEFT.`);
          showFloatingSpeech(curr, "Check Left ⬅️");
          await sleep();
          curr.element.classList.remove('active');
          if(curr.left) drawEdge(curr, curr.left, true);
          await sleep(Config.animationSpeedMs / 2);
          redrawEdges();
          curr = curr.left;
        } else {
          updateTutor(`${val} > ${curr.value}, searching RIGHT.`);
          showFloatingSpeech(curr, "Check Right ➡️");
          await sleep();
          curr.element.classList.remove('active');
          if(curr.right) drawEdge(curr, curr.right, true);
          await sleep(Config.animationSpeedMs / 2);
          redrawEdges();
          curr = curr.right;
        }
      }
      
      if (!found) {
        updateTutor(`${val} is not in the tree.`);
        addLog(`${val} not found`, 'warning');
      }
      
      document.querySelectorAll('.node').forEach(n => n.classList.remove('active', 'found'));
      hideFloatingSpeech();
      redrawEdges();
      setControlsState(false);
    }

    // --- DELETION ---
    async function deleteNode() {
      const val = parseInt(nodeInput.value);
      if (isNaN(val)) return;
      
      setControlsState(true);
      nodeInput.value = '';
      updateTutor(`Initiating deletion of ${val}...`);
      addLog(`Deleting ${val}`);

      const result = await findAndDelete(treeRoot, null, null, val);
      if(result.rootUpdated) treeRoot = result.newRoot;
      
      if (!result.found) {
        updateTutor(`Value ${val} not found to delete.`);
        addLog(`Cannot delete: ${val} not found`, 'warning');
      } else {
        updateTutor(`Successfully deleted ${val}. Re-arranging tree...`);
        calculatePositions();
      }

      document.querySelectorAll('.node').forEach(n => n.classList.remove('active', 'found'));
      hideFloatingSpeech();
      setControlsState(false);
    }

    async function findAndDelete(node, parent, isLeftChild, val) {
      if (!node) return { found: false, newRoot: null, rootUpdated: false };

      node.element.classList.add('active');
      
      if (val < node.value) {
        updateTutor(`${val} < ${node.value}, go left.`);
        showFloatingSpeech(node, `Go left ⬅️`);
        await sleep();
        node.element.classList.remove('active');
        const res = await findAndDelete(node.left, node, true, val);
        if(res.rootUpdated) node.left = res.newRoot;
        return { found: res.found, newRoot: node, rootUpdated: true };
      } 
      else if (val > node.value) {
        updateTutor(`${val} > ${node.value}, go right.`);
        showFloatingSpeech(node, `Go right ➡️`);
        await sleep();
        node.element.classList.remove('active');
        const res = await findAndDelete(node.right, node, false, val);
        if(res.rootUpdated) node.right = res.newRoot;
        return { found: res.found, newRoot: node, rootUpdated: true };
      } 
      else {
        // Node found
        updateTutor(`Found ${val}! Let's determine deletion case...`);
        showFloatingSpeech(node, `Uh oh, it's me! 💥`);
        node.element.classList.replace('active', 'deleting');
        await sleep();

        // Case 1: Leaf
        if (!node.left && !node.right) {
          updateTutor(`Case 1: Node has no children. Simply removing it.`);
          addLog(`${val} deleted (Leaf)`, 'success');
          node.element.remove();
          return { found: true, newRoot: null, rootUpdated: true };
        }
        // Case 2: One child (Right)
        else if (!node.left) {
          updateTutor(`Case 2: Node has only right child. Replacing node with its right child.`);
          addLog(`${val} deleted (1 child)`, 'success');
          node.element.remove();
          return { found: true, newRoot: node.right, rootUpdated: true };
        }
        // Case 2: One child (Left)
        else if (!node.right) {
          updateTutor(`Case 2: Node has only left child. Replacing node with its left child.`);
          addLog(`${val} deleted (1 child)`, 'success');
          node.element.remove();
          return { found: true, newRoot: node.left, rootUpdated: true };
        }
        // Case 3: Two children
        else {
          updateTutor(`Case 3: Node has two children. Finding Inorder Successor (smallest in right subtree).`);
          addLog(`Deleting ${val} (2 children)`, 'warning');
          
          // Find successor
          let succParent = node;
          let succ = node.right;
          
          if(succ) succ.element.classList.add('active');
          await sleep();

          while (succ.left) {
            updateTutor(`Moving left to find smallest...`);
            succ.element.classList.remove('active');
            succParent = succ;
            succ = succ.left;
            succ.element.classList.add('active');
            await sleep();
          }

          updateTutor(`Successor found: ${succ.value}. Replacing ${node.value} with ${succ.value}.`);
          showFloatingSpeech(succ, `I am the successor!`);
          await sleep();

          // Copy value and text
          node.value = succ.value;
          node.element.innerText = succ.value;
          node.element.classList.remove('deleting'); // revive
          node.element.classList.add('found');
          
          succ.element.classList.replace('active', 'deleting');
          await sleep();
          succ.element.remove();

          // Remove successor from its old position
          if (succParent === node) {
            succParent.right = succ.right;
          } else {
            succParent.left = succ.right;
          }

          node.element.classList.remove('found');
          return { found: true, newRoot: node, rootUpdated: true };
        }
      }
    }

    // --- TRAVERSALS ---
    async function traverse(type) {
      if(!treeRoot) {
        updateTutor("Tree is empty!");
        return;
      }
      setControlsState(true);
      const outPanel = document.getElementById('traversalOutput');
      const outCont = document.getElementById('traversalContainer');
      const outLabel = document.getElementById('traversalLabel');
      
      outCont.innerHTML = '';
      outLabel.innerText = `${type.charAt(0).toUpperCase() + type.slice(1)}: `;
      outPanel.classList.add('visible');
      
      updateTutor(`Starting ${type} traversal...`);
      addLog(`Started ${type} traversal`);
      
      if(type === 'inorder') await inorder(treeRoot, outCont);
      else if(type === 'preorder') await preorder(treeRoot, outCont);
      else if(type === 'postorder') await postorder(treeRoot, outCont);

      updateTutor(`Traversal complete!`);
      addLog(`Finished ${type} traversal`, 'success');
      
      setTimeout(() => {
        outPanel.classList.remove('visible');
      }, 5000);
      
      setControlsState(false);
    }

    function addTraversalItem(val, container) {
      const span = document.createElement('span');
      span.className = 'traversal-item';
      span.innerText = val;
      container.appendChild(span);
    }

    async function inorder(node, container) {
      if(!node) return;
      await inorder(node.left, container);
      
      node.element.classList.add('active');
      showFloatingSpeech(node, "Visited! (L N R)");
      addTraversalItem(node.value, container);
      await sleep();
      node.element.classList.remove('active');
      hideFloatingSpeech();
      
      await inorder(node.right, container);
    }

    async function preorder(node, container) {
      if(!node) return;
      
      node.element.classList.add('active');
      showFloatingSpeech(node, "Visited! (N L R)");
      addTraversalItem(node.value, container);
      await sleep();
      node.element.classList.remove('active');
      hideFloatingSpeech();

      await preorder(node.left, container);
      await preorder(node.right, container);
    }

    async function postorder(node, container) {
      if(!node) return;
      await postorder(node.left, container);
      await postorder(node.right, container);
      
      node.element.classList.add('active');
      showFloatingSpeech(node, "Visited! (L R N)");
      addTraversalItem(node.value, container);
      await sleep();
      node.element.classList.remove('active');
      hideFloatingSpeech();
    }

    function resetTree() {
      treeRoot = null;
      nodesLayer.innerHTML = '';
      edgesLayer.innerHTML = '';
      logContainer.innerHTML = '';
      updateTutor("Tree reset. Ready to start fresh!");
    }

    async function loadSampleTree() {
      if (isAnimating) return;
      resetTree();
      updateTutor("Loading sample tree...");
      setControlsState(true);
      const sampleValues = [50, 30, 70, 20, 40, 60, 80];
      for(let v of sampleValues) {
          treeRoot = await (async function insertSilent(node, val) {
            if(!node) {
              let n = new TreeNode(val);
              n.element = createNodeElement(val);
              return n;
            }
            if(val < node.value) node.left = await insertSilent(node.left, val);
            else node.right = await insertSilent(node.right, val);
            return node;
          })(treeRoot, v);
      }
      calculatePositions();
      setControlsState(false);
      updateTutor("Sample tree loaded! Try deleting or traversing it.");
    }

    // Initialization
    updateTutor("Hi! I'm your tutor. Insert your first node to begin.");
    // Pre-fill some data to show off
    (async function initDemo() {
       const initialValues = [50, 30, 70];
       for(let v of initialValues) {
           treeRoot = await (async function insertSilent(node, val) {
             if(!node) {
               let n = new TreeNode(val);
               n.element = createNodeElement(val);
               return n;
             }
             if(val < node.value) node.left = await insertSilent(node.left, val);
             else node.right = await insertSilent(node.right, val);
             return node;
           })(treeRoot, v);
       }
       calculatePositions();
    })();

  </script>
